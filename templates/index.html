{% extends "base.html" %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Study Buddy Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Fredoka+One&display=swap" rel="stylesheet">  

<style>
/* ===== General Reset ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

/* ===== Background & Layout ===== */
body {
    background: linear-gradient(135deg, #1f1f2e, #2a2a3b, #36364a);
    color: #f5f5f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px;
}

/* ===== Header ===== */
.dashboard-heading {
    font-family: 'Fredoka One', cursive;
    font-size: 3rem;
    color: #d4d4ff;
    text-shadow: 2px 2px 8px rgba(91, 95, 255, 0.5);
    margin-bottom: 40px;
    letter-spacing: 1.2px;
}

/* ===== Logout Button ===== */
.logout {
    position: absolute;
    top: 25px;
    right: 25px;
}
.button.logout-btn {
    background: linear-gradient(135deg, #ff6b81, #ff8ba7);
}

/* ===== Container Layout ===== */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    max-height: 80vh; /* 80% of viewport height */
    overflow-y: auto;
    gap: 35px;
    width: 100%;
    max-width: 800x;
}

/* ===== Cards ===== */
.card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    max-height: 500px; /* adjust this number */
    overflow-y: auto; 
    padding: 35px;
    flex: 1 1 45%;
    min-width: 400px;
    box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
    text-align: center;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 35px rgba(91, 95, 255, 0.4);
}

/* ===== Timer Section ===== */
.timer {
    font-size: 3.5rem;
    margin: 15px 0;
    color: #ffffff;
    font-weight: 700;
    text-shadow: 0 0 15px rgba(91, 95, 255, 0.5);
}

/* ===== Buttons ===== */
.button {
    padding: 12px 24px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(135deg, #5b5fff, #8488ff);
    color: #fff;
    cursor: pointer;
    font-weight: 600;
    margin: 8px;
    font-size: 1rem;
    transition: 0.3s;
    box-shadow: 0 4px 15px rgba(91, 95, 255, 0.4);
}

.button:hover {
    transform: translateY(-3px);
    background: linear-gradient(135deg, #7377ff, #a0a3ff);
    box-shadow: 0 6px 20px rgba(91, 95, 255, 0.5);
}

/* ===== Settings Section ===== */
.settings {
    margin-top: 25px;
}

input[type="number"] {
    width: 80px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
    text-align: center;
    font-size: 1rem;
    margin-top: 5px;
}

label {
    color: #d4d4ff;
    font-size: 1rem;
    margin-top: 10px;
}

/* ===== Stats Section ===== */
.stats {
    text-align: center;
    margin-top: 25px;
    color: #e8e8f9;
}

.badge {
    display: inline-block;
    background: rgba(255, 255, 255, 0.15);
    padding: 8px 16px;
    border-radius: 12px;
    margin: 5px;
    font-weight: 600;
    color: #b8e994;
}

/* ===== Messages ===== */
.message {
    font-size: 1.3rem;
    margin: 20px 0;
    color: #baffc9;
}

/* ===== Footer ===== */
footer {
    margin-top: 50px;
    color: #b3b3cc;
    font-size: 0.9rem;
    text-align: center;
}

/* ===== Glow Animation ===== */
@keyframes glow {
    0% { box-shadow: 0 0 10px #5b5fff; }
    50% { box-shadow: 0 0 25px #8488ff; }
    100% { box-shadow: 0 0 10px #5b5fff; }
}

.glow {
    animation: glow 2s infinite alternate;
}
</style>
