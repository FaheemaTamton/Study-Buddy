<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Study Buddy</title>
<style>
    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #ffecd2, #fcb69f);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .container {
        background: #fff;
        padding: 30px 40px;
        border-radius: 20px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        text-align: center;
        width: 350px;
    }
    h1 { margin-bottom: 20px; color: #ff6b81; }
    input[type="text"], input[type="password"] {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 12px;
        border: 1px solid #ddd;
        box-sizing: border-box;
    }
    .button {
        width: 100%;
        padding: 12px;
        background-color: #ff6b81;
        border: none;
        color: white;
        font-weight: bold;
        border-radius: 12px;
        margin-top: 15px;
        cursor: pointer;
        transition: 0.3s;
    }
    .button:hover { background-color: #ff4757; transform: scale(1.05); }
    p { margin-top: 15px; font-size: 0.9rem; color: #555; }
    a { color: #ff6b81; text-decoration: none; font-weight: bold; }
    a:hover { text-decoration: underline; }
    /* Flash message styling */
    .flash {
        background-color: #ffe5e5;
        color: #d94f4f;
        padding: 10px 15px;
        border-radius: 12px;
        margin-bottom: 10px;
        font-size: 0.95rem;
    }
</style>
</head>
<body>
    <div class="container">
        <h1>Login</h1>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for msg in messages %}
              <div class="flash">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button class="button" type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
    </div>
</body>
</html>
